name: Check Kakuyomu Update

on:
  schedule:
    - cron: '55 10 * * *'
    - cron: '00 11 * * *'
    - cron: '05 11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install beautifulsoup4 requests feedgen
      - name: Run script
        run: python main.py
      - name: Commit and push rss.xml
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rss.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update rss.xml" && git push)
